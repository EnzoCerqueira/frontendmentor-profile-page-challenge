<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Social links profile</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="container">
      <div class="content">
        <img class="avatar" src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall">
        <div class="title">
          <h1>Jessica Randall</h1>
          <h5>London, United Kingdom</h5>
        </div>

        <p class="description">"Front-end developer and avid reader."</p>

        <div class="social-links">
          <ul>
            <li><a href="https://github.com" target="_blank">GitHub</a></li>
            <li><a href="https://www.frontendmentor.io" target="_blank">Frontend Mentor</a></li>
            <li><a href="https://www.linkedin.com" target="_blank">LinkedIn</a></li>        
            <li><a href="https://www.twitter.com" target="_blank">Twitter</a></li>
            <li><a href="https://www.instagram.com" target="_blank">Instagram</a></li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
